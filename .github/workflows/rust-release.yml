name: Publish Rust XCFramework

on:
    workflow_dispatch:
        inputs:
            version:
                description: Semantic artifact version, for example 0.2.2 or 0.2.2-rc.1
                required: true
                type: string

permissions:
    contents: write

jobs:
    build-rust:
        name: Build and Publish Rust XCFramework
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  toolchain: 1.94.1
                  targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

            - name: Package release artifact
              run: bash scripts/rust/build/package-rust-release.sh "${{ inputs.version }}"

            - name: Validate local Rust artifact
              env:
                  TOKENIZERS_RUST_LOCAL_XCFRAMEWORK_PATH: Binaries/TokenizersRust.xcframework
              run: |
                  set -euo pipefail

                  swift package clean
                  swift test --traits Rust

            - name: Generate release notes
              env:
                  TARGET_REF: ${{ github.ref_name }}
                  VERSION: ${{ inputs.version }}
              run: |
                  set -euo pipefail

                  python3 scripts/rust/release/rust-release-notes.py \
                      --repo-root . \
                      --target-ref "${TARGET_REF}" \
                      --version "${VERSION}" \
                      --output Artifacts/TokenizersRust-${VERSION}.release-notes.md

            - name: Publish GitHub prerelease assets
              env:
                  GH_TOKEN: ${{ github.token }}
                  VERSION: ${{ inputs.version }}
                  TARGET_REF: ${{ github.ref_name }}
              run: |
                  set -euo pipefail

                  tag="tokenizers-rust-${VERSION}"
                  title="Tokenizers Rust XCFramework ${VERSION}"
                  archive="Artifacts/TokenizersRust-${VERSION}.xcframework.zip"
                  checksum="${archive}.checksum"
                  notes_file="Artifacts/TokenizersRust-${VERSION}.release-notes.md"

                  if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                      echo "Version must be semantic, for example 0.2.2 or 0.2.2-rc.1." >&2
                      exit 1
                  fi

                  if gh release view "${tag}" >/dev/null 2>&1; then
                      echo "Release ${tag} already exists. Publish a new semantic version instead of mutating an existing artifact." >&2
                      exit 1
                  fi

                  if [[ "${VERSION}" == *-* ]]; then
                      gh release create "${tag}" "${archive}" "${checksum}" \
                          --target "${TARGET_REF}" \
                          --title "${title}" \
                          --notes-file "${notes_file}" \
                          --prerelease
                  else
                      gh release create "${tag}" "${archive}" "${checksum}" \
                          --target "${TARGET_REF}" \
                          --title "${title}" \
                          --notes-file "${notes_file}"
                  fi

                  release_url="$(gh release view "${tag}" --json url --jq '.url')"
                  {
                      echo "### Published release"
                      echo
                      echo "- ${release_url}"
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload workflow artifact
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: TokenizersRust-${{ inputs.version }}
                  path: |
                      Artifacts/TokenizersRust-${{ inputs.version }}.xcframework.zip
                      Artifacts/TokenizersRust-${{ inputs.version }}.xcframework.zip.checksum
