name: Publish Rust XCFramework

on:
    workflow_dispatch:
        inputs:
            version:
                description: Artifact label used in the filename and release tag suffix
                required: true
                type: string

permissions:
    contents: write

jobs:
    build-rust-core:
        name: Build Rust Core Artifact
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

            - name: Package release artifact
              run: bash scripts/package-rust-core-release.sh "${{ inputs.version }}"

            - name: Publish GitHub prerelease assets
              env:
                  GH_TOKEN: ${{ github.token }}
                  VERSION: ${{ inputs.version }}
                  TARGET_REF: ${{ github.ref_name }}
              run: |
                  set -euo pipefail

                  tag="rust-core-${VERSION}"
                  title="Rust core artifact for ${VERSION}"
                  archive="Artifacts/TokenizersRustCore-${VERSION}.xcframework.zip"
                  checksum="${archive}.checksum"
                  notes="Prebuilt Rust core XCFramework artifact for ${TARGET_REF}."

                  if gh release view "${tag}" >/dev/null 2>&1; then
                      gh release upload "${tag}" "${archive}" "${checksum}" --clobber
                  else
                      gh release create "${tag}" "${archive}" "${checksum}" \
                          --target "${TARGET_REF}" \
                          --title "${title}" \
                          --notes "${notes}" \
                          --prerelease
                  fi

                  release_url="$(gh release view "${tag}" --json url --jq '.url')"
                  {
                      echo "### Published release"
                      echo
                      echo "- ${release_url}"
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload workflow artifact
              uses: actions/upload-artifact@v6
              with:
                  name: TokenizersRustCore-${{ inputs.version }}
                  path: |
                      Artifacts/TokenizersRustCore-${{ inputs.version }}.xcframework.zip
                      Artifacts/TokenizersRustCore-${{ inputs.version }}.xcframework.zip.checksum
